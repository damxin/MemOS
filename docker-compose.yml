version: '3.8'

services:
  # PostgreSQL with pgvector extension
  postgres:
    image: ankane/pgvector:v0.8.1
    container_name: memos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-memos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-2BrnwJTPjtd4iDEQ}
      POSTGRES_DB: ${POSTGRES_DB:-memos}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    ports:
      - "${POSTGRES_PORT:-24432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-memos} -d ${POSTGRES_DB:-memos}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - 1panel-network

  # Redis for caching and message queue
  redis:
    image: redis:7-alpine
    container_name: memos-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - 1panel-network

  # MemOS API Server
  memos-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: memos-api
    restart: unless-stopped
    environment:
      # Core settings
      - MEMOS_ENV=${MEMOS_ENV:-production}
      - MEMOS_LOG_LEVEL=${MEMOS_LOG_LEVEL:-info}
      
      # Server settings
      - MEMOS_HOST=${MEMOS_HOST:-0.0.0.0}
      - MEMOS_PORT=${MEMOS_PORT:-8080}
      
      # Security
      - MEMOS_SECRET_KEY=${MEMOS_SECRET_KEY}
      - MEMOS_JWT_SECRET=${MEMOS_JWT_SECRET}
      
      # Database - PostgreSQL
      - MEMOS_VEC_DB_BACKEND=${MEMOS_VEC_DB_BACKEND:-pgvector}
      - MEMOS_VEC_DB_HOST=${MEMOS_VEC_DB_HOST:-postgres}
      - MEMOS_VEC_DB_PORT=${MEMOS_VEC_DB_PORT:-5432}
      - MEMOS_VEC_DB_USER=${MEMOS_VEC_DB_USER:-memos}
      - MEMOS_VEC_DB_PASSWORD=${MEMOS_VEC_DB_PASSWORD:-2BrnwJTPjtd4iDEQ}
      - MEMOS_VEC_DB_DATABASE=${MEMOS_VEC_DB_DATABASE:-memos}
      - MEMOS_VEC_DB_COLLECTION=${MEMOS_VEC_DB_COLLECTION:-default}
      - MEMOS_VEC_DB_VECTOR_DIMENSION=${MEMOS_VEC_DB_VECTOR_DIMENSION:-768}
      - MEMOS_VEC_DB_DISTANCE_METRIC=${MEMOS_VEC_DB_DISTANCE_METRIC:-cosine}
      
      # Redis
      - MEMOS_REDIS_ENABLED=${MEMOS_REDIS_ENABLED:-true}
      - MEMOS_REDIS_HOST=${MEMOS_REDIS_HOST:-redis}
      - MEMOS_REDIS_PORT=${MEMOS_REDIS_PORT:-6379}
      - MEMOS_REDIS_PASSWORD=${MEMOS_REDIS_PASSWORD:-}
      
      # LLM Providers
      - MEMOS_OPENAI_API_KEY=${MEMOS_OPENAI_API_KEY}
      - MEMOS_OPENAI_BASE_URL=${MEMOS_OPENAI_BASE_URL}
      - MEMOS_ANTHROPIC_API_KEY=${MEMOS_ANTHROPIC_API_KEY}
      - MEMOS_DEEPSEEK_API_KEY=${MEMOS_DEEPSEEK_API_KEY}
      
    ports:
      - "${MEMOS_PORT:-8080}:8080"
    volumes:
      - memos_data:/app/data
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - 1panel-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  memos_data:
    driver: local

networks:
  1panel-network:
    external: true
    name: 1panel-network
