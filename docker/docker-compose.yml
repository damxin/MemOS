name: memos-dev

services:
  memos:
    container_name: memos-api-docker
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    depends_on:
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_started
      postgres:
        condition: service_healthy
    environment:
      - PYTHONPATH=/app/src
      - HF_ENDPOINT=https://hf-mirror.com
      - QDRANT_HOST=qdrant-docker
      - QDRANT_PORT=6333
      - NEO4J_URI=bolt://neo4j-docker:7687
      # PostgreSQL + pgvector
      - VECTOR_DB_BACKEND=${VECTOR_DB_BACKEND:-pgvector}
      - PGVECTOR_HOST=postgres
      - PGVECTOR_PORT=5432
      - PGVECTOR_DATABASE=${PGVECTOR_DATABASE:-memos}
      - PGVECTOR_USER=${PGVECTOR_USER:-memos}
      - PGVECTOR_PASSWORD=${PGVECTOR_PASSWORD:-2BrnwJTPjtd4iDEQ}
    volumes:
      - ../src:/app/src
      - .:/app/docker
    networks:
      - 1panel-network

  # PostgreSQL with pgvector extension
  postgres:
    image: ankane/pgvector:v0.8.1
    container_name: memos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PGVECTOR_USER:-memos}
      POSTGRES_PASSWORD: ${PGVECTOR_PASSWORD:-2BrnwJTPjtd4iDEQ}
      POSTGRES_DB: ${PGVECTOR_DATABASE:-memos}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    ports:
      - "${PGVECTOR_PORT:-24432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGVECTOR_USER:-memos} -d ${PGVECTOR_DATABASE:-memos}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - 1panel-network

  neo4j:
    image: neo4j:5.26.4
    container_name: neo4j-docker
    ports:
      - "7474:7474"   # HTTP
      - "7687:7687"   # Bolt
    healthcheck:
      test: wget http://localhost:7474 || exit 1
      interval: 1s
      timeout: 10s
      retries: 20
      start_period: 3s
    environment:
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
      NEO4J_AUTH: "neo4j/12345678"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - 1panel-network

  qdrant:
    image: qdrant/qdrant:v1.15.3
    container_name: qdrant-docker
    ports:
      - "6333:6333"  # REST API
      - "6334:6334"  # gRPC API
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__SERVICE__HTTP_PORT: 6333
    restart: unless-stopped
    networks:
      - 1panel-network

volumes:
  neo4j_data:
  neo4j_logs:
  qdrant_data:
  postgres_data:

networks:
  1panel-network:
    external: true
    name: 1panel-network
